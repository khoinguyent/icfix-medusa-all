services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: icfix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - icfix-pgdata:/var/lib/postgresql/data
    networks: [icfix-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}", "-q"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2. Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: icfix-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks: [icfix-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 3. MeiliSearch Service
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: icfix-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-masterKey}
      MEILI_ENV: ${MEILISEARCH_ENV:-production}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks: [icfix-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 4. Medusa Backend Service
  medusa-backend:
    # Using the new image built by your GitHub Actions workflow.
    image: ghcr.io/khoinguyent/icfix-medusa-all:latest
    container_name: icfix-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    # Expose the port only to the internal Docker network for Nginx to access
    environment:
      MEDUSA_ADMIN_DISABLE: 'true'
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      
      # MeiliSearch configuration
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-masterKey}
      
      # JWT and CORS configuration
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      
      # File storage (R2) - optional
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION:-auto}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_FILE_URL: ${R2_FILE_URL}
      R2_PREFIX: ${R2_PREFIX:-}
      
      # EmailEngine integration - optional
      EMAILENGINE_API_URL: ${EMAILENGINE_API_URL:-https://icfix.duckdns.org/email}
      EMAILENGINE_API_KEY: ${EMAILENGINE_API_KEY}
      EMAILENGINE_ACCOUNT_ID: ${EMAILENGINE_ACCOUNT_ID}
    expose:
      - "9000"
    networks: [icfix-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # 5. Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: icfix-nginx
    restart: unless-stopped
    depends_on:
      medusa-backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    networks: [icfix-net]

  # 6. EmailEngine Service
  emailengine:
    image: postalsys/emailengine:v2
    container_name: icfix-emailengine
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Redis connection (required by EmailEngine)
      EENGINE_REDIS: redis://redis:6379/7
      
      # PostgreSQL database connection  
      EENGINE_DB_CLIENT: postgres
      EENGINE_DB_HOST: postgres
      EENGINE_DB_PORT: 5432
      EENGINE_DB_NAME: ${EMAILENGINE_DB:-emailengine}
      EENGINE_DB_USER: ${EMAILENGINE_DB_USER:-postgres}
      EENGINE_DB_PASSWORD: ${EMAILENGINE_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      
      # Admin and authentication
      EENGINE_ADMIN: ${EMAILENGINE_ADMIN_USER:-admin}:${EMAILENGINE_ADMIN_PASS:-admin123}
      EENGINE_SECRET: ${EMAILENGINE_SECRET:-change-this-secret}
      
      # Application URL and webhooks
      EENGINE_URL: ${EMAILENGINE_API_URL:-https://icfix.duckdns.org/email}
      EENGINE_WEBHOOK_KEY: ${EMAILENGINE_WEBHOOK_KEY}
      
      # Gmail OAuth configuration
      OAUTH_GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      OAUTH_GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      OAUTH_GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
      
      # Port configuration
      EENGINE_PORT: 3000
    ports:
      - "${EMAILENGINE_PORT:-3000}:3000"
    volumes:
      - emailengine_data:/var/lib/emailengine
    networks: [icfix-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/account"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 7. Certbot for SSL Certificates
  certbot:
    image: certbot/certbot
    container_name: icfix-certbot
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Keep the container running to perform certificate renewals
    entrypoint: ["sh", "-c", "sleep infinity"]
    networks: [icfix-net]

volumes:
  icfix-pgdata:
  meilisearch_data:
  emailengine_data:
  emailengine_credentials:

networks:
  icfix-net:
    driver: bridge